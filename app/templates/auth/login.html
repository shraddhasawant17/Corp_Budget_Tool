<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — RBL Bank IT Budget Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(200,16,46,0.18), transparent),
        radial-gradient(ellipse 50% 50% at 90% 90%, rgba(200,16,46,0.07), transparent),
        var(--bg);
    }
    .login-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(200,16,46,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,16,46,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid rgba(200,16,46,0.18);
      border-radius: 20px; padding: 44px 40px;
      box-shadow: 0 0 80px rgba(200,16,46,0.09), var(--shadow-lg);
    }
    .login-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .login-logo .logo-mark { width: 46px; height: 46px; font-size: 18px; border-radius: 12px; }
    .login-brand-name { font-size: 17px; font-weight: 800; letter-spacing: 0.3px; }
    .login-brand-sub  { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .error-box {
      background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.25);
      border-radius: 9px; padding: 11px 14px;
      font-size: 13px; color: var(--rbl-light-red); margin-bottom: 18px;
    }
    .demo-accounts {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-top: 20px;
    }
    .demo-title { font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
    .demo-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
    }
    .demo-row:last-child { border-bottom: none; padding-bottom: 0; }
    .demo-role { font-weight: 600; color: var(--text); }
    .demo-email { color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .demo-pass  { color: var(--text-faint); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .theme-btn-login {
      position: fixed; top: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      cursor: pointer; font-size: 16px; z-index: 10;
    }
  </style>
</head>
<body>
  <div class="login-grid"></div>
  <button class="theme-btn-login" onclick="toggleTheme()" id="themeBtn">🌙</button>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark">₹B</div>
        <div>
          <div class="login-brand-name">RBL Bank</div>
          <div class="login-brand-sub">IT Budget Management Portal</div>
        </div>
      </div>

      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to access your budget workspace</div>

      {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/login">
        <div class="field-group">
          <label class="field-label field-required">Email Address</label>
          <input class="field-input" type="email" name="email"
            placeholder="yourname@rblbank.com"
            value="{{ prefill_email or '' }}" required autofocus/>
        </div>
        <div class="field-group">
          <label class="field-label field-required">Password</label>
          <input class="field-input" type="password" name="password"
            placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
          Sign In →
        </button>
      </form>

      <div class="demo-accounts">
        <div class="demo-title">🧪 Demo Accounts (Prototype)</div>
        <div class="demo-row">
          <span class="demo-role">IT Head</span>
          <span class="demo-email">rajesh@rblbank.com</span>
          <span class="demo-pass">Pass@1234</span>
        </div>
        <div class="demo-row">
          <span class="demo-role">Admin (CA)</span>
          <span class="demo-email">kavita@rblbank.com</span>
          <span class="demo-pass">Pass@1234</span>
        </div>
        <div class="demo-row">
          <span class="demo-role">CEO</span>
          <span class="demo-email">vishwavir@rblbank.com</span>
          <span class="demo-pass">Pass@1234</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
